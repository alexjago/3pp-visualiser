[uwsgi]
wsgi-file = /opt/threeparty/threeparty.py

module = threeparty:application

master = true
processes = 5
reaper = true
buffer-size = 65535

logto = /tmp/uwsgi_threeparty.log

socket = /run/uwsgi/threeparty.sock
chmod-socket = 660
vacuum = true

die-on-term = true
uid = www-data
gid = www-data

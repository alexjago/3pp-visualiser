<style>
form table tr th {
  font-weight: normal;
}

fieldset label {
  margin-right: 1ch;
}

fieldset input {

<script>
function qs(sid) {
  return document.querySelector(sid)
}

var ytz = qs("#y_to_z");
var ytx = qs("#y_to_x");
var zty = qs("#z_to_y");
var ztx = qs("#z_to_x");
var xty = qs("#x_to_y");
var xtz = qs("#x_to_z");

var xName = qs("#x_name");
var yName = qs("#y_name");
var zName = qs("#z_name");
var yColour = qs("#y_colour");
var matchupModeButtons = document.querySelectorAll("#matchup-modes button");
var matchupModes = qs("#matchup-modes");
var matchupModesRow = qs("#matchup-modes-row");
var yMatchupRow = qs("#y-matchup-row");
var matchupModesInline = window.matchMedia("(min-width: 40.001em)");
var chartModeInputs = document.querySelectorAll('input[name="chart_mode"]');
var shorthandOptions = qs("#shorthand-options");
var shorthandInputs = shorthandOptions.querySelectorAll('input[type="number"]');
var ternaryBounds = qs("#ternary-bounds");
var ternaryBoundInputs = ternaryBounds.querySelectorAll('input');
var poiImportFile = qs("#poi-import-file");
var poiStatus = qs("#poi-status");
var formStatus = qs("#form-status");
var matchupModePreferences = {
  "Greens": {
	y_to_z: 80,
	y_to_x: 20,
	z_to_y: 80,
	z_to_x: 20,
	x_to_z: 70,
	x_to_y: 30
  },
  "One Nation": {
	y_to_x: 65,
	y_to_z: 35,
	x_to_y: 60,
	x_to_z: 40,
	z_to_x: 80,
	z_to_y: 20
  }
};
var percentParams = new Set([
  "x_to_y", "x_to_z", "y_to_x", "y_to_z", "z_to_x", "z_to_y",
  "start", "stop", "step", "x_min", "x_max", "y_min", "y_max", "z_min", "z_max", "px", "py"
]);

function partyLabel(value, fallback) {
  let label = (value || "").trim();
  return label.length ? label : fallback;
}

function syncPartyLabels() {
  let xLabel = partyLabel(xName.value, "X");
  let yLabel = partyLabel(yName.value, "Y");
  let zLabel = partyLabel(zName.value, "Z");

  qs("#from_x_name").textContent = `from ${xLabel}`;
  qs("#from_y_name").textContent = `from ${yLabel}`;
  qs("#from_z_name").textContent = `from ${zLabel}`;
  qs("#to_x_name").textContent = `to ${xLabel}`;
  qs("#to_y_name").textContent = `to ${yLabel}`;
  qs("#to_z_name").textContent = `to ${zLabel}`;
  qs("#poi_x_name").textContent = `${xLabel} vote (X, %)`;
  qs("#poi_y_name").textContent = `${yLabel} vote (Y, %)`;
  qs("#x_bound_name").textContent = xLabel;
  qs("#y_bound_name").textContent = yLabel;
  qs("#z_bound_name").textContent = zLabel;
}

function syncMatchupModeButtons() {
  matchupModeButtons.forEach((button) => {
	let active = yName.value == button.dataset.yName && yColour.value.toLowerCase() == button.dataset.yColour;
	button.setAttribute("aria-pressed", active.toString());
  });
}

function isCoalitionLaborMatchup() {
  return xName.value.trim().toLowerCase() == "coalition" &&
	zName.value.trim().toLowerCase() == "labor";
}

function applyMatchupModePreferences(mode) {
  if (!isCoalitionLaborMatchup()) return;

  Object.entries(matchupModePreferences[mode]).forEach(([id, value]) => {
	qs(`#${id}`).value = value;
  });
}

function setYPartyMode(button) {
  yName.value = button.dataset.yName;
  yColour.value = button.dataset.yColour;
  applyMatchupModePreferences(button.dataset.yName);
  syncPartyLabels();
  syncMatchupModeButtons();
}

function placeMatchupModes() {
  (matchupModesInline.matches ? yMatchupRow : matchupModesRow).appendChild(matchupModes);
}

function syncChartModeOptions() {
  let ternary = qs('input[name="chart_mode"]:checked').value == "ternary";
  shorthandOptions.hidden = ternary;
  shorthandInputs.forEach((input) => {
	input.disabled = ternary;
  });
  ternaryBounds.hidden = !ternary;
  ternaryBoundInputs.forEach((input) => {
	input.disabled = !ternary;
  });
}

placeMatchupModes();
matchupModesInline.addEventListener("change", placeMatchupModes);
syncPartyLabels();
syncMatchupModeButtons();
syncChartModeOptions();
xName.addEventListener("input", syncPartyLabels);
yName.addEventListener("input", () => {
  syncPartyLabels();
  syncMatchupModeButtons();
});
zName.addEventListener("input", syncPartyLabels);
yColour.addEventListener("input", syncMatchupModeButtons);
matchupModeButtons.forEach((button) => button.addEventListener("click", () => setYPartyMode(button)));
chartModeInputs.forEach((input) => input.addEventListener("change", syncChartModeOptions));
poiImportFile.addEventListener("change", importPOICSV);

document.querySelectorAll('input[name="prefs"]').forEach((elem) => elem.addEventListener('change', (event) => {
  event.preventDefault();
  if (event.target.value == "Compulsory") {
	// Restore CPV invariant
	// There's a choice of ways to do this but we'll
	// keep the relative proportions the same
	// (rather than e.g. the votes/vote margin)
	let xt = (+xty.value) + (+xtz.value);
	let yt = (+ytx.value) + (+ytz.value);
	let zt = (+zty.value) + (+ztx.value);

	xty.value = ((+xty.value) / xt) * 100;
	xtz.value = ((+xtz.value) / xt) * 100;
	ytx.value = ((+ytx.value) / yt) * 100;
	ytz.value = ((+ytz.value) / yt) * 100;
	ztx.value = ((+ztx.value) / zt) * 100;
	zty.value = ((+zty.value) / zt) * 100;
  }
}));

var dlForm = document.forms['dlForm'];
var preferenceAdjustmentWarnings = [];

function rememberPreferenceAdjustment(sourceLabel, adjusted) {
  if (qs('input[name="prefs"]:checked').value != "Optional") return;

  preferenceAdjustmentWarnings = [
	`${sourceLabel} optional preferences exceeded 100%, so the paired value was adjusted to ${adjusted.value}%.`
  ];
  formStatus.textContent = preferenceAdjustmentWarnings[0];
}

dlForm.addEventListener('change', (event) => {
  event.preventDefault();
  let c = (qs('input[name="prefs"]:checked').value == "Compulsory");
  if ([xty, xtz, zty, ztx, ytz, ytx].includes(event.target)) {
	preferenceAdjustmentWarnings = [];
  }
  // maintain invariants:
  // compulsory pref: sum == 100
  // optional pref: sum <= 100
  if ((event.target == xty) && (c || ((+xty.value + (+xtz.value)) > 100))) {
	xtz.value = 100 - xty.value
	rememberPreferenceAdjustment(partyLabel(xName.value, "X"), xtz);
  }
  if ((event.target == xtz) && (c || ((+xtz.value + (+xty.value)) > 100))) {
	xty.value = 100 - xtz.value
	rememberPreferenceAdjustment(partyLabel(xName.value, "X"), xty);
  }
  if ((event.target == zty) && (c || ((+zty.value + (+ztx.value)) > 100))) {
	ztx.value = 100 - zty.value
	rememberPreferenceAdjustment(partyLabel(zName.value, "Z"), ztx);
  }
  if ((event.target == ztx) && (c || ((+ztx.value + (+zty.value)) > 100))) {
	zty.value = 100 - ztx.value
	rememberPreferenceAdjustment(partyLabel(zName.value, "Z"), zty);
  }
  if ((event.target == ytz) && (c || ((+ytz.value + (+ytx.value)) > 100))) {
	ytx.value = 100 - ytz.value
	rememberPreferenceAdjustment(partyLabel(yName.value, "Y"), ytx);
  }
  if ((event.target == ytx) && (c || ((+ytx.value + (+ytz.value)) > 100))) {
	ytz.value = 100 - ytx.value
	rememberPreferenceAdjustment(partyLabel(yName.value, "Y"), ytz);
  }
});

function buildSearchParams() {
  let fd = new FormData(dlForm);
  let search = new URLSearchParams();
  for (let [key, value] of fd.entries()) {
	if (key == "prefs") continue;
	if (value === "") continue;
	if (percentParams.has(key) && value !== "") {
	  let n = Number(value);
	  if (Number.isFinite(n)) {
		search.append(key, compactRatio(n / 100));
		continue;
	  }
	}
	search.append(key, value);
  }
  return search;
}

function compactRatio(value) {
  return Number(value.toPrecision(12)).toString();
}

function graphURL(search) {
  return "https://3pp.abjago.net/wsgi?" + search.toString();
}

function longURLWarning(url) {
  if (url.length <= 3500) return "";
  if (url.length <= 8000) {
	return ` This graph URL is ${url.length} characters; large POI sets may exceed server or proxy limits. Export POIs as CSV if sharing fails.`;
  }
  return ` This graph URL is ${url.length} characters and is likely too long for reliable GET requests. Export POIs as CSV or reduce the POI set.`;
}

function showLongURLWarning(url) {
  let warning = longURLWarning(url);
  if (!warning) return;
  formStatus.textContent = [formStatus.textContent, warning.trim()].filter(Boolean).join(" ");
}

function numberFromInput(input) {
  let value = input.value.trim();
  if (value == "") return null;
  let n = Number(value);
  return Number.isFinite(n) ? n : null;
}

function validatePreferenceRows() {
  let messages = [];
  let rows = [
	{x: xty, z: xtz, label: `${partyLabel(xName.value, "X")} preference row`},
	{x: ytx, z: ytz, label: `${partyLabel(yName.value, "Y")} preference row`},
	{x: ztx, z: zty, label: `${partyLabel(zName.value, "Z")} preference row`}
  ];

  rows.forEach((row) => {
	let first = numberFromInput(row.x);
	let second = numberFromInput(row.z);
	if (first === null || second === null) {
	  messages.push(`${row.label} has a blank or invalid percentage.`);
	  return;
	}
	if (first < 0 || first > 100 || second < 0 || second > 100) {
	  messages.push(`${row.label} has a percentage outside 0..100%.`);
	  return;
	}
	if (first + second > 100) {
	  messages.push(`${row.label} sums to ${(first + second).toFixed(1)}%, so the backend would normalise it.`);
	}
  });

  return messages;
}

function validateTernaryBounds() {
  if (qs('input[name="chart_mode"]:checked').value != "ternary") return [];

  let mins = ["x_min", "y_min", "z_min"].map((id) => numberFromInput(qs(`#${id}`)));
  if (mins.some((value) => value === null)) {
	return ["Ternary minimum bounds must all be valid percentages."];
  }
  if (mins.some((value) => value < 0 || value > 100)) {
	return ["Ternary minimum bounds must be between 0% and 100%."];
  }
  let total = mins.reduce((sum, value) => sum + value, 0);
  if (total > 100) {
	return [`Ternary minimum bounds sum to ${total.toFixed(1)}%, leaving no drawable triangle.`];
  }
  return [];
}

function validatePOITable() {
  let messages = [];
  let blankRows = 0;

  Array.from(qs("#poitable tbody").rows).forEach((row, index) => {
	let px = row.querySelector('input[name="px"]').value.trim();
	let py = row.querySelector('input[name="py"]').value.trim();
	let pl = row.querySelector('input[name="pl"]').value.trim();

	if (px == "" && py == "" && pl == "") {
	  blankRows++;
	  return;
	}

	let x = Number(px);
	let y = Number(py);
	if (px == "" || py == "" || !Number.isFinite(x) || !Number.isFinite(y)) {
	  messages.push(`POI row ${index + 1} needs valid X and Y percentages.`);
	  return;
	}
	if (x < 0 || x > 100 || y < 0 || y > 100) {
	  messages.push(`POI row ${index + 1} has a percentage outside 0..100%.`);
	  return;
	}
	if (x + y > 100) {
	  messages.push(`POI row ${index + 1} has X + Y = ${(x + y).toFixed(1)}%, which leaves no valid Z share.`);
	}
  });

  return {messages, blankRows};
}

function validateBeforeGraphAction() {
  let messages = [
	...validateTernaryBounds(),
	...validatePreferenceRows(),
	...preferenceAdjustmentWarnings
  ];
  let poiValidation = validatePOITable();
  messages.push(...poiValidation.messages);

  formStatus.textContent = messages.join(" ");
  if (poiValidation.messages.length) {
	showPOIStatus(poiValidation.messages.join(" "));
  } else if (poiValidation.blankRows) {
	showPOIStatus(`${poiValidation.blankRows} blank POI row${poiValidation.blankRows == 1 ? "" : "s"} will be ignored.`);
  } else if (poiStatus.textContent.startsWith("Imported") || poiStatus.textContent.startsWith("Exported")) {
	// Keep useful import/export feedback visible.
  } else {
	showPOIStatus("");
  }

  return messages.length == 0;
}

function reloadGraph() {
  if (!validateBeforeGraphAction()) return false;
  let search = buildSearchParams();
  let url = graphURL(search);
  document.getElementById("fillMe").setAttribute("src", url);
  showLongURLWarning(url);
}

function copyTextToClipboard(text) {
  if (navigator.clipboard && window.isSecureContext) {
	return navigator.clipboard.writeText(text);
  }

  let textarea = document.createElement("textarea");
  textarea.value = text;
  textarea.setAttribute("readonly", "");
  textarea.style.position = "fixed";
  textarea.style.left = "-9999px";
  document.body.appendChild(textarea);
  textarea.select();

  let copied = document.execCommand("copy");
  document.body.removeChild(textarea);
  if (!copied) return Promise.reject(new Error("copy command failed"));
  return Promise.resolve();
}

function copyShareLink() {
  if (!validateBeforeGraphAction()) return false;

  document.getElementById("dlinput").setAttribute("value", "");
  let search = buildSearchParams();
  search.delete("dl");
  let url = graphURL(search);

  copyTextToClipboard(url).then(() => {
	formStatus.textContent = "Share link copied." + longURLWarning(url);
  }).catch(() => {
	formStatus.textContent = url;
  });

  return false;
}

function downloadGraph() {
  if (!validateBeforeGraphAction()) return false;
  document.getElementById("dlinput").setAttribute("value", "true");
  let search = buildSearchParams();
  let url = graphURL(search);
  window.open(url)
  showLongURLWarning(url);
  document.getElementById("dlinput").setAttribute("value", "");
  return false;
}

function poiInput(type, name, value) {
  let input = document.createElement("input");
  input.type = type;
  input.name = name;
  input.setAttribute("optional", "");
  if (type == "number") {
	input.min = "0";
	input.max = "100";
	input.step = "0.1";
  }
  if (name == "px") input.placeholder = "43";
  if (name == "py") input.placeholder = "33";
  if (name == "pl") input.placeholder = "Ryan 2022";
  if (value !== undefined) input.value = value;
  return input;
}

function addPOIRow(values = {}) {
  var ttt = qs("#poitable tbody")
  var row = ttt.insertRow(-1)
  var px = row.insertCell(0)
  var py = row.insertCell(1)
  var pl = row.insertCell(2)
  var delb = row.insertCell(3)

  px.dataset.label = "X vote (%)"
  py.dataset.label = "Y vote (%)"
  pl.dataset.label = "Label"

  px.appendChild(poiInput("number", "px", values.px));
  py.appendChild(poiInput("number", "py", values.py));
  pl.appendChild(poiInput("text", "pl", values.pl));

  delb.innerHTML = '<button type="button" onclick="deletePOIRow(this)" style="margin: 0em 1em">-</button>'
}

function deletePOIRow(btn) {
  var row = btn.parentNode.parentNode;
  row.parentNode.removeChild(row);
  if (!qs("#poitable tbody").rows.length) addPOIRow();
}

function getPOIRows() {
  return Array.from(qs("#poitable tbody").rows).map((row) => ({
	px: row.querySelector('input[name="px"]').value.trim(),
	py: row.querySelector('input[name="py"]').value.trim(),
	pl: row.querySelector('input[name="pl"]').value
  })).filter((row) => row.px != "" || row.py != "" || row.pl.trim() != "");
}

function setPOIRows(rows) {
  let tbody = qs("#poitable tbody");
  tbody.replaceChildren();
  if (!rows.length) {
	addPOIRow();
	return;
  }
  rows.forEach((row) => addPOIRow(row));
}

function clearPOIRows() {
  setPOIRows([]);
  showPOIStatus("POIs cleared.");
}

function showPOIStatus(message) {
  poiStatus.textContent = message;
}

function parseCSV(text) {
  let rows = [];
  let row = [];
  let field = "";
  let quoted = false;

  for (let i = 0; i < text.length; i++) {
	let ch = text[i];
	if (quoted) {
	  if (ch == '"') {
		if (text[i + 1] == '"') {
		  field += '"';
		  i++;
		} else {
		  quoted = false;
		}
	  } else {
		field += ch;
	  }
	} else if (ch == '"') {
	  if (field == "") {
		quoted = true;
	  } else {
		field += ch;
	  }
	} else if (ch == ",") {
	  row.push(field);
	  field = "";
	} else if (ch == "\r" || ch == "\n") {
	  row.push(field);
	  rows.push(row);
	  row = [];
	  field = "";
	  if (ch == "\r" && text[i + 1] == "\n") i++;
	} else {
	  field += ch;
	}
  }

  if (quoted) throw new Error("unterminated quoted field");
  if (field != "" || row.length) {
	row.push(field);
	rows.push(row);
  }
  return rows;
}

function formatCSV(rows) {
  function cell(value) {
	let text = String(value ?? "");
	if (/[",\r\n]/.test(text)) {
	  return `"${text.replace(/"/g, '""')}"`;
	}
	return text;
  }
  return [["x", "y", "label"], ...rows.map((row) => [row.px, row.py, row.pl])]
	.map((row) => row.map(cell).join(","))
	.join("\r\n") + "\r\n";
}

function validPOINumber(value) {
  if (value == "") return false;
  let n = Number(value);
  return Number.isFinite(n) && n >= 0 && n <= 100;
}

function importPOICSV(event) {
  let file = event.target.files[0];
  if (!file) return;

  file.text().then((text) => {
	text = text.replace(/^\uFEFF/, "");
	let csvRows;
	try {
	  csvRows = parseCSV(text);
	} catch (e) {
	  showPOIStatus(`Import failed: ${e.message}.`);
	  return;
	} finally {
	  poiImportFile.value = "";
	}

	if (csvRows.length &&
	  (csvRows[0][0] || "").trim().toLowerCase() == "x" &&
	  (csvRows[0][1] || "").trim().toLowerCase() == "y") {
	  csvRows.shift();
	}

	let validRows = [];
	let skipped = 0;
	csvRows.forEach((row) => {
	  if (row.every((cell) => (cell || "").trim() == "")) return;

	  let px = (row[0] || "").trim();
	  let py = (row[1] || "").trim();
	  let pl = row.slice(2).join(",");
	  if (!validPOINumber(px) || !validPOINumber(py) || Number(px) + Number(py) > 100) {
		skipped++;
		return;
	  }
	  validRows.push({px, py, pl});
	});

	setPOIRows(validRows);
	let message = `Imported ${validRows.length} POI${validRows.length == 1 ? "" : "s"}.`;
	if (skipped) message += ` Skipped ${skipped} invalid row${skipped == 1 ? "" : "s"}.`;
	showPOIStatus(message);
  }).catch((e) => {
	poiImportFile.value = "";
	showPOIStatus(`Import failed: ${e.message}.`);
  });
}

function exportPOICSV() {
  let rows = getPOIRows();
  let blob = new Blob([formatCSV(rows)], {type: "text/csv"});
  let url = URL.createObjectURL(blob);
  let link = document.createElement("a");
  link.href = url;
  link.download = "3pp-pois.csv";
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
  showPOIStatus(`Exported ${rows.length} POI${rows.length == 1 ? "" : "s"}.`);
}

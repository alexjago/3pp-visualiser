<style>
form table tr th {
  font-weight: normal;
}

fieldset label {
  margin-right: 1ch;
}

fieldset input {
  margin-right: 4ch;
}

  }

  #matchup-modes {
	display: flex;
	flex-direction: column;
	align-items: flex-start;
  }

  #iwrap {
	min-height: 70vh;
  }
}

<div id="iwrap" width="100%">
  <iframe src="https://3pp.abjago.net/default.svg" id="fillMe"></iframe>
</div>


<script>
function qs(sid) {
  return document.querySelector(sid)
}

var ytz = qs("#y_to_z");
var ytx = qs("#y_to_x");
var zty = qs("#z_to_y");
var ztx = qs("#z_to_x");
var xty = qs("#x_to_y");
var xtz = qs("#x_to_z");

var xName = qs("#x_name");
var yName = qs("#y_name");
var zName = qs("#z_name");
var yColour = qs("#y_colour");
var matchupModeButtons = document.querySelectorAll("#matchup-modes button");
var chartModeInputs = document.querySelectorAll('input[name="chart_mode"]');
var shorthandOptions = qs("#shorthand-options");
var shorthandInputs = shorthandOptions.querySelectorAll('input[type="number"]');
var ternaryBounds = qs("#ternary-bounds");
var ternaryBoundInputs = ternaryBounds.querySelectorAll('input');
var poiImportFile = qs("#poi-import-file");
var poiStatus = qs("#poi-status");
var matchupModePreferences = {
  "Greens": {
	y_to_z: 80,
	y_to_x: 20,
	z_to_y: 80,
	z_to_x: 20,
	x_to_z: 70,
	x_to_y: 30
  },
  "One Nation": {
	y_to_x: 65,
	y_to_z: 35,
	x_to_y: 60,
	x_to_z: 40,
	z_to_x: 80,
	z_to_y: 20
  }
};
var percentParams = new Set([
  "x_to_y", "x_to_z", "y_to_x", "y_to_z", "z_to_x", "z_to_y",
  "start", "stop", "step", "x_min", "x_max", "y_min", "y_max", "z_min", "z_max", "px", "py"
]);

function partyLabel(value, fallback) {
  let label = (value || "").trim();
  return label.length ? label : fallback;
}

function syncPartyLabels() {
  let xLabel = partyLabel(xName.value, "X");
  let yLabel = partyLabel(yName.value, "Y");
  let zLabel = partyLabel(zName.value, "Z");

  qs("#from_x_name").textContent = `from ${xLabel}`;
  qs("#from_y_name").textContent = `from ${yLabel}`;
  qs("#from_z_name").textContent = `from ${zLabel}`;
  qs("#to_x_name").textContent = `to ${xLabel}`;
  qs("#to_y_name").textContent = `to ${yLabel}`;
  qs("#to_z_name").textContent = `to ${zLabel}`;
  qs("#poi_x_name").textContent = `${xLabel} vote (X, %)`;
  qs("#poi_y_name").textContent = `${yLabel} vote (Y, %)`;
  qs("#x_bound_name").textContent = xLabel;
  qs("#y_bound_name").textContent = yLabel;
  qs("#z_bound_name").textContent = zLabel;
}

function syncMatchupModeButtons() {
  matchupModeButtons.forEach((button) => {
	let active = yName.value == button.dataset.yName && yColour.value.toLowerCase() == button.dataset.yColour;
	button.setAttribute("aria-pressed", active.toString());
  });
}

function isCoalitionLaborMatchup() {
  return xName.value.trim().toLowerCase() == "coalition" &&
	zName.value.trim().toLowerCase() == "labor";
}

function applyMatchupModePreferences(mode) {
  if (!isCoalitionLaborMatchup()) return;

  Object.entries(matchupModePreferences[mode]).forEach(([id, value]) => {
	qs(`#${id}`).value = value;
  });
}

function setYPartyMode(button) {
  yName.value = button.dataset.yName;
  yColour.value = button.dataset.yColour;
  applyMatchupModePreferences(button.dataset.yName);
  syncPartyLabels();
  syncMatchupModeButtons();
}

function syncChartModeOptions() {
  let ternary = qs('input[name="chart_mode"]:checked').value == "ternary";
  shorthandOptions.hidden = ternary;
  shorthandInputs.forEach((input) => {
	input.disabled = ternary;
  });
  ternaryBounds.hidden = !ternary;
  ternaryBoundInputs.forEach((input) => {
	input.disabled = !ternary;
  });
}

syncPartyLabels();
syncMatchupModeButtons();
syncChartModeOptions();
xName.addEventListener("input", syncPartyLabels);
yName.addEventListener("input", () => {
  syncPartyLabels();
  syncMatchupModeButtons();
});
zName.addEventListener("input", syncPartyLabels);
yColour.addEventListener("input", syncMatchupModeButtons);
matchupModeButtons.forEach((button) => button.addEventListener("click", () => setYPartyMode(button)));
chartModeInputs.forEach((input) => input.addEventListener("change", syncChartModeOptions));
poiImportFile.addEventListener("change", importPOICSV);

document.querySelectorAll('input[name="prefs"]').forEach((elem) => elem.addEventListener('change', (event) => {
  event.preventDefault();
  if (event.target.value == "Compulsory") {
	// Restore CPV invariant
	// There's a choice of ways to do this but we'll
	// keep the relative proportions the same
	// (rather than e.g. the votes/vote margin)
	let xt = (+xty.value) + (+xtz.value);
	let yt = (+ytx.value) + (+ytz.value);
	let zt = (+zty.value) + (+ztx.value);

	xty.value = ((+xty.value) / xt) * 100;
	xtz.value = ((+xtz.value) / xt) * 100;
	ytx.value = ((+ytx.value) / yt) * 100;
	ytz.value = ((+ytz.value) / yt) * 100;
	ztx.value = ((+ztx.value) / zt) * 100;
	zty.value = ((+zty.value) / zt) * 100;
  }
}));

var dlForm = document.forms['dlForm'];

dlForm.addEventListener('change', (event) => {
  event.preventDefault();
  let c = (qs('input[name="prefs"]:checked').value == "Compulsory");
  // maintain invariants:
  // compulsory pref: sum == 100
  // optional pref: sum <= 100
  if ((event.target == xty) && (c || ((+xty.value + (+xtz.value)) > 100))) {
	xtz.value = 100 - xty.value
  }
  if ((event.target == xtz) && (c || ((+xtz.value + (+xty.value)) > 100))) {
	xty.value = 100 - xtz.value
  }
  if ((event.target == zty) && (c || ((+zty.value + (+ztx.value)) > 100))) {
	ztx.value = 100 - zty.value
  }
  if ((event.target == ztx) && (c || ((+ztx.value + (+zty.value)) > 100))) {
	zty.value = 100 - ztx.value
  }
  if ((event.target == ytz) && (c || ((+ytz.value + (+ytx.value)) > 100))) {
	ytx.value = 100 - ytz.value
  }
  if ((event.target == ytx) && (c || ((+ytx.value + (+ytz.value)) > 100))) {
	ytz.value = 100 - ytx.value
  }
});

function buildSearchParams() {
  let fd = new FormData(dlForm);
  let search = new URLSearchParams();
  for (let [key, value] of fd.entries()) {
	if (key == "prefs") continue;
	if (percentParams.has(key) && value !== "") {
	  let n = Number(value);
	  if (Number.isFinite(n)) {
		search.append(key, (n / 100).toString());
		continue;
	  }
	}
	search.append(key, value);
  }
  return search;
}

function reloadGraph() {
  let search = buildSearchParams();
  document.getElementById("fillMe").setAttribute("src", "https://3pp.abjago.net/wsgi?" + search.toString())
}

function downloadGraph() {
  document.getElementById("dlinput").setAttribute("value", "true");
  let search = buildSearchParams();
  window.open("https://3pp.abjago.net/wsgi?" + search.toString())
  document.getElementById("dlinput").setAttribute("value", "");
  return false;
}

function poiInput(type, name, value) {
  let input = document.createElement("input");
  input.type = type;
  input.name = name;
  input.setAttribute("optional", "");
  if (type == "number") {
	input.min = "0";
	input.max = "100";
	input.step = "0.1";
  }
  if (name == "px") input.placeholder = "43";
  if (name == "py") input.placeholder = "33";
  if (name == "pl") input.placeholder = "Ryan 2022";
  if (value !== undefined) input.value = value;
  return input;
}

function addPOIRow(values = {}) {
  var ttt = qs("#poitable tbody")
  var row = ttt.insertRow(-1)
  var px = row.insertCell(0)
  var py = row.insertCell(1)
  var pl = row.insertCell(2)
  var delb = row.insertCell(3)

  px.appendChild(poiInput("number", "px", values.px));
  py.appendChild(poiInput("number", "py", values.py));
  pl.appendChild(poiInput("text", "pl", values.pl));

  delb.innerHTML = '<button type="button" onclick="deletePOIRow(this)" style="margin: 0em 1em">-</button>'
}

function deletePOIRow(btn) {
  var row = btn.parentNode.parentNode;
  row.parentNode.removeChild(row);
  if (!qs("#poitable tbody").rows.length) addPOIRow();
}

function getPOIRows() {
  return Array.from(qs("#poitable tbody").rows).map((row) => ({
	px: row.querySelector('input[name="px"]').value.trim(),
	py: row.querySelector('input[name="py"]').value.trim(),
	pl: row.querySelector('input[name="pl"]').value
  })).filter((row) => row.px != "" || row.py != "" || row.pl.trim() != "");
}

function setPOIRows(rows) {
  let tbody = qs("#poitable tbody");
  tbody.replaceChildren();
  if (!rows.length) {
	addPOIRow();
	return;
  }
  rows.forEach((row) => addPOIRow(row));
}

function clearPOIRows() {
  setPOIRows([]);
  showPOIStatus("POIs cleared.");
}

function showPOIStatus(message) {
  poiStatus.textContent = message;
}

function parseCSV(text) {
  let rows = [];
  let row = [];
  let field = "";
  let quoted = false;

  for (let i = 0; i < text.length; i++) {
	let ch = text[i];
	if (quoted) {
	  if (ch == '"') {
		if (text[i + 1] == '"') {
		  field += '"';
		  i++;
		} else {
		  quoted = false;
		}
	  } else {
		field += ch;
	  }
	} else if (ch == '"') {
	  if (field == "") {
		quoted = true;
	  } else {
		field += ch;
	  }
	} else if (ch == ",") {
	  row.push(field);
	  field = "";
	} else if (ch == "\r" || ch == "\n") {
	  row.push(field);
	  rows.push(row);
	  row = [];
	  field = "";
	  if (ch == "\r" && text[i + 1] == "\n") i++;
	} else {
	  field += ch;
	}
  }

  if (quoted) throw new Error("unterminated quoted field");
  if (field != "" || row.length) {
	row.push(field);
	rows.push(row);
  }
  return rows;
}

function formatCSV(rows) {
  function cell(value) {
	let text = String(value ?? "");
	if (/[",\r\n]/.test(text)) {
	  return `"${text.replace(/"/g, '""')}"`;
	}
	return text;
  }
  return [["x", "y", "label"], ...rows.map((row) => [row.px, row.py, row.pl])]
	.map((row) => row.map(cell).join(","))
	.join("\r\n") + "\r\n";
}

function validPOINumber(value) {
  if (value == "") return false;
  let n = Number(value);
  return Number.isFinite(n) && n >= 0 && n <= 100;
}

function importPOICSV(event) {
  let file = event.target.files[0];
  if (!file) return;

  file.text().then((text) => {
	text = text.replace(/^\uFEFF/, "");
	let csvRows;
	try {
	  csvRows = parseCSV(text);
	} catch (e) {
	  showPOIStatus(`Import failed: ${e.message}.`);
	  return;
	} finally {
	  poiImportFile.value = "";
	}

	if (csvRows.length &&
	  (csvRows[0][0] || "").trim().toLowerCase() == "x" &&
	  (csvRows[0][1] || "").trim().toLowerCase() == "y") {
	  csvRows.shift();
	}

	let validRows = [];
	let skipped = 0;
	csvRows.forEach((row) => {
	  if (row.every((cell) => (cell || "").trim() == "")) return;

	  let px = (row[0] || "").trim();
	  let py = (row[1] || "").trim();
	  let pl = row.slice(2).join(",");
	  if (!validPOINumber(px) || !validPOINumber(py) || Number(px) + Number(py) > 100) {
		skipped++;
		return;
	  }
	  validRows.push({px, py, pl});
	});

	setPOIRows(validRows);
	let message = `Imported ${validRows.length} POI${validRows.length == 1 ? "" : "s"}.`;
	if (skipped) message += ` Skipped ${skipped} invalid row${skipped == 1 ? "" : "s"}.`;
	showPOIStatus(message);
  }).catch((e) => {
	poiImportFile.value = "";
	showPOIStatus(`Import failed: ${e.message}.`);
  });
}

function exportPOICSV() {
  let rows = getPOIRows();
  let blob = new Blob([formatCSV(rows)], {type: "text/csv"});
  let url = URL.createObjectURL(blob);
  let link = document.createElement("a");
  link.href = url;
  link.download = "3pp-pois.csv";
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
  showPOIStatus(`Exported ${rows.length} POI${rows.length == 1 ? "" : "s"}.`);
}

</script>

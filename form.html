<style>
form table tr th {
  font-weight: normal;
}

fieldset label {
  margin-right: 1ch;
}

fieldset input {
  margin-right: 4ch;
}

fieldset input[type="radio"] {
  margin-right: 1ch;
}

fieldset input[type="radio"] + label {
  margin-right: 4ch;
}

#matchup-table th,
#matchup-table td {
  vertical-align: baseline;
}

#matchup-table input[type="color"] {
  width: 4em;
  height: 1.8em;
  padding: 0;
  position: relative;
  top: 3px;
}

#matchup-table input[type="text"] {
  width: 40ch;
}

#matchup-table .role-note {
  font-size: 0.9em;
  color: #666;
  font-style: normal;
  white-space: nowrap;
}

#matchup-modes button {
  margin-right: 0.4em;
  margin-bottom: 0.2em;
}

#matchup-modes button[aria-pressed="true"] {
  font-weight: bold;
}

#matchup-modes button[aria-pressed="false"] {
  font-weight: normal;
}

#layout-options,
#ternary-bounds {
  margin-top: 0.6em;
}

#layout-options label,
#ternary-bounds label {
  margin-right: 0.4ch;
}

#ternary-bounds th,
#ternary-bounds td {
  padding-right: 1em;
  text-align: left;
}

#ternary-bounds input[type="number"] {
  width: 7ch;
}

#iwrap {
  position: relative;
  min-height: min(78vh, 48rem);
  border-radius: 1em;
  overflow: hidden;
  background-color: #fff;
}

#fillMe {
  position: absolute;
  inset: 0;
  border: 0;
  width: 100%;
  height: 100%;
}

@media (max-width: 40em) {
  #matchup-table input[type="text"] {
	width: 22ch;
	max-width: 45vw;
  }

  #matchup-modes {
	display: flex;
	flex-direction: column;
	align-items: flex-start;
  }

  #iwrap {
	min-height: 70vh;
  }
}
</style>
<form method="get" action="https://3pp.abjago.net/wsgi" id="dlForm" markdown="0">
  <fieldset>
	<legend>Matchup</legend>
	<table id="matchup-table">
	  <tbody>
		<tr>
		  <td><input type="text" value="Coalition" name="x_name" id="x_name"></td>
		  <td><input type="color" value="#0088ee" name="x_colour" id="x_colour"></td>
		  <td class="role-note">(X axis)</td>
		</tr>
		<tr>
		  <td><input type="text" value="Greens" name="y_name" id="y_name"></td>
		  <td><input type="color" value="#00aa22" name="y_colour" id="y_colour"></td>
		  <td class="role-note">(Y axis)</td>
		  <td id="matchup-modes" aria-label="Y-axis party presets">
			<button type="button" data-y-name="Greens" data-y-colour="#00aa22" aria-pressed="true">Greens mode</button>
			<button type="button" data-y-name="One Nation" data-y-colour="#ff8000" aria-pressed="false">One Nation mode</button>
		  </td>
		</tr>
		<tr>
		  <td><input type="text" value="Labor" name="z_name" id="z_name"></td>
		  <td><input type="color" value="#dd0044" name="z_colour" id="z_colour"></td>
		  <td class="role-note">(Balance)</td>
		</tr>
	  </tbody>
	</table>
  </fieldset>
  <br />
  <fieldset>
	<legend>Select preference flow rates (%)</legend>

	<table>
	  <thead>
		<tr>
		  <th>&nbsp;</th>
		  <th id="from_y_name">from Greens</th>
		  <th id="from_z_name">from Labor</th>
		  <th id="from_x_name">from Coalition</th>
		</tr>
	  </thead>
	  <tbody>
		<tr>
		  <th scope="row" id="to_y_name">to Greens</th>
		  <td></td>
		  <td><input type="number" min="0" max="100" step="0.1" value="80" name="z_to_y" id="z_to_y"
			  optional=""></td>
		  <td><input type="number" min="0" max="100" step="0.1" value="30" name="x_to_y" id="x_to_y"
			  optional=""></td>
		</tr>

		<tr>
		  <th scope="row" id="to_z_name">to Labor</th>
		  <td><input type="number" min="0" max="100" step="0.1" value="80" name="y_to_z" id="y_to_z"
			  optional=""></td>
		  <td></td>
		  <td><input type="number" min="0" max="100" step="0.1" value="70" name="x_to_z" id="x_to_z"
			  optional=""></td>
		</tr>

		<tr>
		  <th scope="row" id="to_x_name">to Coalition</th>
		  <td><input type="number" min="0" max="100" step="0.1" value="20" name="y_to_x" id="y_to_x"
			  optional=""></td>
		  <td><input type="number" min="0" max="100" step="0.1" value="20" name="z_to_x" id="z_to_x"
			  optional=""></td>
		  <td></td>
		</tr>

	</table>
	<input type="radio" name="prefs" id="prefs_compulsory" value="Compulsory" checked />
	<label for="prefs_compulsory">Compulsory preferential</label>
	<input type="radio" name="prefs" id="prefs_optional" value="Optional" />
	<label for="prefs_optional">Optional preferential</label>
  </fieldset>
  <br />
  <fieldset>
	<legend>Set graph layout options (%)</legend>
	<input type="radio" name="chart_mode" id="chart_mode_cartesian" value="cartesian" checked>
	<label for="chart_mode_cartesian">Cartesian</label>
	<input type="radio" name="chart_mode" id="chart_mode_ternary" value="ternary">
	<label for="chart_mode_ternary">Ternary</label>
<div id="layout-options">
<div id="shorthand-options">
<label for="start">Minimum X & Y axis value:</label>
<input type="number" min="0" max="50" step="0.1" value="20" name="start" id="start" optional="">
<label for="stop">Maximum X & Y axis value:</label>
<input type="number" min="0" max="100" step="0.1" value="60" name="stop" id="stop" optional="">
</div>
<div id="dot-size-option">
<label for="step">Size of dots:</label>
<input type="number" min="0" max="5" step="0.1" value="1" name="step" id="step" optional="">
</div>
</div>
	<table id="ternary-bounds" hidden>
	  <thead>
		<tr>
		  <th>Party</th>
		  <th>Minimum</th>
		</tr>
	  </thead>
	  <tbody>
		<tr>
		  <th scope="row" id="x_bound_name">Coalition</th>
		  <td>
			<input type="number" min="0" max="100" step="0.1" value="20" name="x_min" id="x_min" disabled>
			<input type="hidden" name="x_max" id="x_max" value="100" disabled>
		  </td>
		</tr>
		<tr>
		  <th scope="row" id="y_bound_name">Greens</th>
		  <td>
			<input type="number" min="0" max="100" step="0.1" value="20" name="y_min" id="y_min" disabled>
			<input type="hidden" name="y_max" id="y_max" value="100" disabled>
		  </td>
		</tr>
		<tr>
		  <th scope="row" id="z_bound_name">Labor</th>
		  <td>
			<input type="number" min="0" max="100" step="0.1" value="20" name="z_min" id="z_min" disabled>
			<input type="hidden" name="z_max" id="z_max" value="100" disabled>
		  </td>
		</tr>
	  </tbody>
	</table>
  </fieldset>
  <br />
  <fieldset>
	<legend>Add Points of Interest <button type="button" onclick="addPOIRow()" style="margin: 0em 1em">+</button>
	</legend>
	<table id="poitable">
	  <thead>
		<tr>
		  <th id="poi_x_name">Coalition vote (X, %)</th>
		  <th id="poi_y_name">Greens vote (Y, %)</th>
		  <th>Label</th>
		  <th></th>
		</tr>
	  </thead>
	  <tbody>
		<tr>
		  <td><input type="number" min="0" max="100" step="0.1" name="px" optional="" placeholder="43"></td>
		  <td>
			<input type="number" min="0" max="100" step="0.1" name="py" optional="" placeholder="33">
		  </td>
		  <td>
			<input type="text" name="pl" optional="" placeholder="Ryan 2022">
		  </td>
		  <td><button type="button" onclick="deletePOIRow(this)" style="margin: 0em 1em">-</button></td>
		</tr>
	  </tbody>
	</table>
  </fieldset>
  <br />
  <div id="buttons" width="100%;">
<button type="button" class="btn btn-primary" style="justify-self: flex-start;" onclick="reloadGraph(); return false;">Reload
  Graph</button>
<button type="button" class="btn" style="justify-self: flex-end;" onclick="downloadGraph()">Download
  Graph</button>
  </div>
  <input type="hidden" name="dl" id="dlinput">
</form>
<br />


<div id="iwrap" width="100%">
  <iframe src="https://3pp.abjago.net/default.svg" id="fillMe"></iframe>
</div>


<script>
function qs(sid) {
  return document.querySelector(sid)
}

var ytz = qs("#y_to_z");
var ytx = qs("#y_to_x");
var zty = qs("#z_to_y");
var ztx = qs("#z_to_x");
var xty = qs("#x_to_y");
var xtz = qs("#x_to_z");

var xName = qs("#x_name");
var yName = qs("#y_name");
var zName = qs("#z_name");
var yColour = qs("#y_colour");
var matchupModeButtons = document.querySelectorAll("#matchup-modes button");
var chartModeInputs = document.querySelectorAll('input[name="chart_mode"]');
var shorthandOptions = qs("#shorthand-options");
var shorthandInputs = shorthandOptions.querySelectorAll('input[type="number"]');
var ternaryBounds = qs("#ternary-bounds");
var ternaryBoundInputs = ternaryBounds.querySelectorAll('input');
var matchupModePreferences = {
  "Greens": {
	y_to_z: 80,
	y_to_x: 20,
	z_to_y: 80,
	z_to_x: 20,
	x_to_z: 70,
	x_to_y: 30
  },
  "One Nation": {
	y_to_x: 65,
	y_to_z: 35,
	x_to_y: 60,
	x_to_z: 40,
	z_to_x: 80,
	z_to_y: 20
  }
};
var percentParams = new Set([
  "x_to_y", "x_to_z", "y_to_x", "y_to_z", "z_to_x", "z_to_y",
  "start", "stop", "step", "x_min", "x_max", "y_min", "y_max", "z_min", "z_max", "px", "py"
]);

function partyLabel(value, fallback) {
  let label = (value || "").trim();
  return label.length ? label : fallback;
}

function syncPartyLabels() {
  let xLabel = partyLabel(xName.value, "X");
  let yLabel = partyLabel(yName.value, "Y");
  let zLabel = partyLabel(zName.value, "Z");

  qs("#from_x_name").textContent = `from ${xLabel}`;
  qs("#from_y_name").textContent = `from ${yLabel}`;
  qs("#from_z_name").textContent = `from ${zLabel}`;
  qs("#to_x_name").textContent = `to ${xLabel}`;
  qs("#to_y_name").textContent = `to ${yLabel}`;
  qs("#to_z_name").textContent = `to ${zLabel}`;
  qs("#poi_x_name").textContent = `${xLabel} vote (X, %)`;
  qs("#poi_y_name").textContent = `${yLabel} vote (Y, %)`;
  qs("#x_bound_name").textContent = xLabel;
  qs("#y_bound_name").textContent = yLabel;
  qs("#z_bound_name").textContent = zLabel;
}

function syncMatchupModeButtons() {
  matchupModeButtons.forEach((button) => {
	let active = yName.value == button.dataset.yName && yColour.value.toLowerCase() == button.dataset.yColour;
	button.setAttribute("aria-pressed", active.toString());
  });
}

function isCoalitionLaborMatchup() {
  return xName.value.trim().toLowerCase() == "coalition" &&
	zName.value.trim().toLowerCase() == "labor";
}

function applyMatchupModePreferences(mode) {
  if (!isCoalitionLaborMatchup()) return;

  Object.entries(matchupModePreferences[mode]).forEach(([id, value]) => {
	qs(`#${id}`).value = value;
  });
}

function setYPartyMode(button) {
  yName.value = button.dataset.yName;
  yColour.value = button.dataset.yColour;
  applyMatchupModePreferences(button.dataset.yName);
  syncPartyLabels();
  syncMatchupModeButtons();
}

function syncChartModeOptions() {
  let ternary = qs('input[name="chart_mode"]:checked').value == "ternary";
  shorthandOptions.hidden = ternary;
  shorthandInputs.forEach((input) => {
	input.disabled = ternary;
  });
  ternaryBounds.hidden = !ternary;
  ternaryBoundInputs.forEach((input) => {
	input.disabled = !ternary;
  });
}

syncPartyLabels();
syncMatchupModeButtons();
syncChartModeOptions();
xName.addEventListener("input", syncPartyLabels);
yName.addEventListener("input", () => {
  syncPartyLabels();
  syncMatchupModeButtons();
});
zName.addEventListener("input", syncPartyLabels);
yColour.addEventListener("input", syncMatchupModeButtons);
matchupModeButtons.forEach((button) => button.addEventListener("click", () => setYPartyMode(button)));
chartModeInputs.forEach((input) => input.addEventListener("change", syncChartModeOptions));

document.querySelectorAll('input[name="prefs"]').forEach((elem) => elem.addEventListener('change', (event) => {
  event.preventDefault();
  if (event.target.value == "Compulsory") {
	// Restore CPV invariant
	// There's a choice of ways to do this but we'll
	// keep the relative proportions the same
	// (rather than e.g. the votes/vote margin)
	let xt = (+xty.value) + (+xtz.value);
	let yt = (+ytx.value) + (+ytz.value);
	let zt = (+zty.value) + (+ztx.value);

	xty.value = ((+xty.value) / xt) * 100;
	xtz.value = ((+xtz.value) / xt) * 100;
	ytx.value = ((+ytx.value) / yt) * 100;
	ytz.value = ((+ytz.value) / yt) * 100;
	ztx.value = ((+ztx.value) / zt) * 100;
	zty.value = ((+zty.value) / zt) * 100;
  }
}));

var dlForm = document.forms['dlForm'];

dlForm.addEventListener('change', (event) => {
  event.preventDefault();
  let c = (qs('input[name="prefs"]:checked').value == "Compulsory");
  // maintain invariants:
  // compulsory pref: sum == 100
  // optional pref: sum <= 100
  if ((event.target == xty) && (c || ((+xty.value + (+xtz.value)) > 100))) {
	xtz.value = 100 - xty.value
  }
  if ((event.target == xtz) && (c || ((+xtz.value + (+xty.value)) > 100))) {
	xty.value = 100 - xtz.value
  }
  if ((event.target == zty) && (c || ((+zty.value + (+ztx.value)) > 100))) {
	ztx.value = 100 - zty.value
  }
  if ((event.target == ztx) && (c || ((+ztx.value + (+zty.value)) > 100))) {
	zty.value = 100 - ztx.value
  }
  if ((event.target == ytz) && (c || ((+ytz.value + (+ytx.value)) > 100))) {
	ytx.value = 100 - ytz.value
  }
  if ((event.target == ytx) && (c || ((+ytx.value + (+ytz.value)) > 100))) {
	ytz.value = 100 - ytx.value
  }
});

function buildSearchParams() {
  let fd = new FormData(dlForm);
  let search = new URLSearchParams();
  for (let [key, value] of fd.entries()) {
	if (key == "prefs") continue;
	if (percentParams.has(key) && value !== "") {
	  let n = Number(value);
	  if (Number.isFinite(n)) {
		search.append(key, (n / 100).toString());
		continue;
	  }
	}
	search.append(key, value);
  }
  return search;
}

function reloadGraph() {
  let search = buildSearchParams();
  document.getElementById("fillMe").setAttribute("src", "https://3pp.abjago.net/wsgi?" + search.toString())
}

function downloadGraph() {
  document.getElementById("dlinput").setAttribute("value", "true");
  let search = buildSearchParams();
  window.open("https://3pp.abjago.net/wsgi?" + search.toString())
  document.getElementById("dlinput").setAttribute("value", "");
  return false;
}

function addPOIRow() {
  var ttt = qs("#poitable")
  var row = ttt.insertRow(-1)
  var px = row.insertCell(0)
  var py = row.insertCell(1)
  var pl = row.insertCell(2)
  var delb = row.insertCell(3)

  px.innerHTML = '<input type="number" min="0" max="100" step="0.1" name="px" >'
  py.innerHTML = '<input type="number" min="0" max="100" step="0.1" name="py" >'
  pl.innerHTML = '<input type="text" name="pl" >'

  delb.innerHTML = '<button type="button" onclick="deletePOIRow(this)" style="margin: 0em 1em">-</button>'
}

function deletePOIRow(btn) {
  var row = btn.parentNode.parentNode;
  row.parentNode.removeChild(row);
}

// addPOIRow();
</script>

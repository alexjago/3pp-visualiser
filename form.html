<style>
form table tr th {
  font-weight: normal;
}

fieldset label {
  margin-right: 1ch;
}

fieldset input {
  margin-right: 4ch;
}

fieldset input[type="radio"] {
  margin-right: 1ch;
}

fieldset input[type="radio"] + label {
  margin-right: 4ch;
}

#matchup-table th,
#matchup-table td {
  vertical-align: baseline;
}

#matchup-table input[type="color"] {
  width: 4em;
  height: 1.8em;
  padding: 0;
  position: relative;
  top: 3px;
}

#matchup-table input[type="text"] {
  width: 40ch;
}

#matchup-table .role-note {
  font-size: 0.9em;
  color: #666;
  font-style: normal;
  white-space: nowrap;
}
</style>
<form method="get" target="_blank" action="https://3pp.abjago.net/wsgi" id="dlForm">
  <fieldset>
	<legend>Matchup</legend>
	<table id="matchup-table">
	  <tbody>
		<tr>
		  <td><input type="text" value="Coalition" name="x_name" id="x_name"></td>
		  <td><input type="color" value="#0088ee" name="x_colour" id="x_colour"></td>
		  <td class="role-note">(X axis)</td>
		</tr>
		<tr>
		  <td><input type="text" value="Greens" name="y_name" id="y_name"></td>
		  <td><input type="color" value="#00aa22" name="y_colour" id="y_colour"></td>
		  <td class="role-note">(Y axis)</td>
		</tr>
		<tr>
		  <td><input type="text" value="Labor" name="z_name" id="z_name"></td>
		  <td><input type="color" value="#dd0044" name="z_colour" id="z_colour"></td>
		  <td class="role-note">(Balance)</td>
		</tr>
	  </tbody>
	</table>
  </fieldset>
  <br />
  <fieldset>
	<legend>Select preference flow rates (%)</legend>

	<table>
	  <thead>
		<tr>
		  <th>&nbsp;</th>
		  <th id="from_y_name">from Greens</th>
		  <th id="from_z_name">from Labor</th>
		  <th id="from_x_name">from Coalition</th>
		</tr>
	  </thead>
	  <tbody>
		<tr>
		  <th scope="row" id="to_y_name">to Greens</th>
		  <td></td>
		  <td><input type="number" min="0" max="100" step="0.1" value="80" name="z_to_y" id="z_to_y"
			  optional=""></td>
		  <td><input type="number" min="0" max="100" step="0.1" value="30" name="x_to_y" id="x_to_y"
			  optional=""></td>
		</tr>

		<tr>
		  <th scope="row" id="to_z_name">to Labor</th>
		  <td><input type="number" min="0" max="100" step="0.1" value="80" name="y_to_z" id="y_to_z"
			  optional=""></td>
		  <td></td>
		  <td><input type="number" min="0" max="100" step="0.1" value="70" name="x_to_z" id="x_to_z"
			  optional=""></td>
		</tr>

		<tr>
		  <th scope="row" id="to_x_name">to Coalition</th>
		  <td><input type="number" min="0" max="100" step="0.1" value="20" name="y_to_x" id="y_to_x"
			  optional=""></td>
		  <td><input type="number" min="0" max="100" step="0.1" value="20" name="z_to_x" id="z_to_x"
			  optional=""></td>
		  <td></td>
		</tr>

	</table>
	<input type="radio" name="prefs" id="prefs_compulsory" value="Compulsory" checked />
	<label for="prefs_compulsory">Compulsory preferential</label>
	<input type="radio" name="prefs" id="prefs_optional" value="Optional" />
	<label for="prefs_optional">Optional preferential</label>
  </fieldset>
  <br />
  <fieldset>
	<legend>Set graph layout options (%)</legend>
	<label for="start">Minimum X & Y axis value:</label>
	<input type="number" min="0" max="50" step="0.1" value="20" name="start" optional="">
	<label for="stop">Maximum X & Y axis value:</label>
	<input type="number" min="0" max="100" step="0.1" value="60" name="stop" optional="">
	<label for="step">Size of dots:</label>
	<input type="number" min="0" max="5" step="0.1" value="1" name="step" optional="">
  </fieldset>
  <br />
  <fieldset>
	<legend>Add Points of Interest <button type="button" onclick="addPOIRow()" style="margin: 0em 1em">+</button>
	</legend>
	<table id="poitable">
	  <thead>
		<tr>
		  <th id="poi_x_name">Coalition vote (X, %)</th>
		  <th id="poi_y_name">Greens vote (Y, %)</th>
		  <th>Label</th>
		  <th></th>
		</tr>
	  </thead>
	  <tbody>
		<tr>
		  <td><input type="number" min="0" max="100" step="0.1" name="px" optional="" placeholder="43"></td>
		  <td>
			<input type="number" min="0" max="100" step="0.1" name="py" optional="" placeholder="33">
		  </td>
		  <td>
			<input type="text" name="pl" optional="" placeholder="Ryan 2022">
		  </td>
		  <td><button type="button" onclick="deletePOIRow(this)" style="margin: 0em 1em">-</button></td>
	  </tbody>
	</table>
  </fieldset>
  <br />
  <div id="buttons" width="100%;">
<button type="submit" class="btn btn-primary" style="justify-self: flex-start;">Reload
  Graph</button>
<button type="button" class="btn" style="justify-self: flex-end;" onclick="downloadGraph()">Download
  Graph</button>
  </div>
  </fieldset>
  <input type="hidden" name="dl" id="dlinput">
</form>
<br />


<div id="iwrap" width="100%"
  style="position:relative; padding-top:100%; border-radius:1em; overflow: hidden; background-color:#fff">
  <iframe src="https://3pp.abjago.net/default.svg" style="position:absolute; top:0; left:0; border:0;" height="100%"
	width="100%" id="fillMe"></iframe>
</div>


<script>
function qs(sid) {
  return document.querySelector(sid)
}

var ytz = qs("#y_to_z");
var ytx = qs("#y_to_x");
var zty = qs("#z_to_y");
var ztx = qs("#z_to_x");
var xty = qs("#x_to_y");
var xtz = qs("#x_to_z");

var xName = qs("#x_name");
var yName = qs("#y_name");
var zName = qs("#z_name");
var percentParams = new Set([
  "x_to_y", "x_to_z", "y_to_x", "y_to_z", "z_to_x", "z_to_y",
  "start", "stop", "step", "px", "py"
]);

function partyLabel(value, fallback) {
  let label = (value || "").trim();
  return label.length ? label : fallback;
}

function syncPartyLabels() {
  let xLabel = partyLabel(xName.value, "X");
  let yLabel = partyLabel(yName.value, "Y");
  let zLabel = partyLabel(zName.value, "Z");

  qs("#from_x_name").textContent = `from ${xLabel}`;
  qs("#from_y_name").textContent = `from ${yLabel}`;
  qs("#from_z_name").textContent = `from ${zLabel}`;
  qs("#to_x_name").textContent = `to ${xLabel}`;
  qs("#to_y_name").textContent = `to ${yLabel}`;
  qs("#to_z_name").textContent = `to ${zLabel}`;
  qs("#poi_x_name").textContent = `${xLabel} vote (X, %)`;
  qs("#poi_y_name").textContent = `${yLabel} vote (Y, %)`;
}

syncPartyLabels();
xName.addEventListener("input", syncPartyLabels);
yName.addEventListener("input", syncPartyLabels);
zName.addEventListener("input", syncPartyLabels);

document.querySelectorAll('input[name="prefs"]').forEach((elem) => elem.addEventListener('change', (event) => {
  event.preventDefault();
  if (event.target.value == "Compulsory") {
	// Restore CPV invariant
	// There's a choice of ways to do this but we'll
	// keep the relative proportions the same
	// (rather than e.g. the votes/vote margin)
	let xt = (+xty.value) + (+xtz.value);
	let yt = (+ytx.value) + (+ytz.value);
	let zt = (+zty.value) + (+ztx.value);

	xty.value = ((+xty.value) / xt) * 100;
	xtz.value = ((+xtz.value) / xt) * 100;
	ytx.value = ((+ytx.value) / yt) * 100;
	ytz.value = ((+ytz.value) / yt) * 100;
	ztx.value = ((+ztx.value) / zt) * 100;
	zty.value = ((+zty.value) / zt) * 100;
  }
}));

var dlForm = document.forms['dlForm'];

dlForm.addEventListener('change', (event) => {
  event.preventDefault();
  let c = (qs('input[name="prefs"]:checked').value == "Compulsory");
  // maintain invariants:
  // compulsory pref: sum == 100
  // optional pref: sum <= 100
  if ((event.target == xty) && (c || ((+xty.value + (+xtz.value)) > 100))) {
	xtz.value = 100 - xty.value
  }
  if ((event.target == xtz) && (c || ((+xtz.value + (+xty.value)) > 100))) {
	xty.value = 100 - xtz.value
  }
  if ((event.target == zty) && (c || ((+zty.value + (+ztx.value)) > 100))) {
	ztx.value = 100 - zty.value
  }
  if ((event.target == ztx) && (c || ((+ztx.value + (+zty.value)) > 100))) {
	zty.value = 100 - ztx.value
  }
  if ((event.target == ytz) && (c || ((+ytz.value + (+ytx.value)) > 100))) {
	ytx.value = 100 - ytz.value
  }
  if ((event.target == ytx) && (c || ((+ytx.value + (+ytz.value)) > 100))) {
	ytz.value = 100 - ytx.value
  }
});

function buildSearchParams() {
  let fd = new FormData(dlForm);
  let search = new URLSearchParams();
  for (let [key, value] of fd.entries()) {
	if (key == "prefs") continue;
	if (percentParams.has(key) && value !== "") {
	  let n = Number(value);
	  if (Number.isFinite(n)) {
		search.append(key, (n / 100).toString());
		continue;
	  }
	}
	search.append(key, value);
  }
  return search;
}

dlForm.addEventListener('submit', (event) => {
  event.preventDefault();
  let search = buildSearchParams();
  document.getElementById("fillMe").setAttribute("src", "https://3pp.abjago.net/wsgi?" + search.toString())
});

function downloadGraph() {
  document.getElementById("dlinput").setAttribute("value", "true");
  let search = buildSearchParams();
  window.open("https://3pp.abjago.net/wsgi?" + search.toString())
  document.getElementById("dlinput").setAttribute("value", "");
  return false;
}

function addPOIRow() {
  var ttt = qs("#poitable")
  var row = ttt.insertRow(-1)
  var px = row.insertCell(0)
  var py = row.insertCell(1)
  var pl = row.insertCell(2)
  var delb = row.insertCell(3)

  px.innerHTML = '<input type="number" min="0" max="100" step="0.1" name="px" >'
  py.innerHTML = '<input type="number" min="0" max="100" step="0.1" name="py" >'
  pl.innerHTML = '<input type="text" name="pl" >'

  delb.innerHTML = '<button type="button" onclick="deletePOIRow(this)" style="margin: 0em 1em">-</button>'
}

function deletePOIRow(btn) {
  var row = btn.parentNode.parentNode;
  row.parentNode.removeChild(row);
}

// addPOIRow();
</script>
